# Sweep: Combined shift — friction + push + delay simultaneously
# Tests robustness when multiple axes shift at once
# Each level increases severity across all three axes:
#   Level 0: nominal (in-distribution center)
#   Level 1: mild shift
#   Level 2: moderate shift
#   Level 3: severe shift (at/near DR boundary)
#   Level 4: extreme shift (beyond DR boundary)
sweep:
  name: combined_shift
  variable: _combined_shift_level
  values: [0, 1, 2, 3, 4]
  # Interpretation of levels (applied in eval.py):
  #   Level 0: friction=1.0, push=[0,0],   delay=[0,0]
  #   Level 1: friction=0.7, push=[1,2],   delay=[1,1]
  #   Level 2: friction=0.5, push=[2,3],   delay=[2,2]
  #   Level 3: friction=0.3, push=[3,5],   delay=[3,3]
  #   Level 4: friction=0.1, push=[5,8],   delay=[5,5]
  combined_params:
    - {friction_range: [1.0, 1.0], push_vel_range: [0.0, 0.0], action_delay_range: [0, 0]}
    - {friction_range: [0.7, 0.7], push_vel_range: [1.0, 2.0], action_delay_range: [1, 1]}
    - {friction_range: [0.5, 0.5], push_vel_range: [2.0, 3.0], action_delay_range: [2, 2]}
    - {friction_range: [0.3, 0.3], push_vel_range: [3.0, 5.0], action_delay_range: [3, 3]}
    - {friction_range: [0.1, 0.1], push_vel_range: [5.0, 8.0], action_delay_range: [5, 5]}
