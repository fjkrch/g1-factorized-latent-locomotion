# Sweep: Combined shift — severe levels only (3 and 4)
# Subset of combined_shift.yaml for factorial OOD analysis
# Level 3: severe shift (at/near DR boundary)
# Level 4: extreme shift (beyond DR boundary)
sweep:
  name: combined_shift_severe
  variable: _combined_shift_level
  values: [3, 4]
  combined_params:
    - {friction_range: [0.3, 0.3], push_vel_range: [3.0, 5.0], action_delay_range: [3, 3]}
    - {friction_range: [0.1, 0.1], push_vel_range: [5.0, 8.0], action_delay_range: [5, 5]}
