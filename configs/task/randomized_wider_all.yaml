# Batch 2 V2: Wider all ranges (broadened coverage across all OOD axes)
# Extends every DR range to cover the full evaluation sweep ranges.
# Rationale: Friction eval at 0.1 < training min 0.3; delay eval 5 > training max 3.
task:
  name: randomized
  domain_randomization:
    enabled: true
    friction_range: [0.1, 2.5]       # WIDENED: was [0.3, 2.0] — covers eval 0.1
    restitution_range: [0.0, 0.8]    # unchanged
    added_mass_range: [-2.0, 5.0]    # unchanged
    com_displacement_range: [-0.08, 0.08]  # unchanged
    motor_strength_range: [0.7, 1.3] # unchanged
    kp_range: [0.8, 1.2]             # unchanged
    kd_range: [0.8, 1.2]             # unchanged
    action_delay_range: [0, 5]        # WIDENED: was [0, 3] — covers eval delay 5
    push_vel_range: [0.5, 5.0]       # WIDENED: was [0.5, 2.0] — covers eval push 3-5
    push_steps: [5, 10, 15]          # unchanged
  terrain:
    type: flat
    curriculum: false
