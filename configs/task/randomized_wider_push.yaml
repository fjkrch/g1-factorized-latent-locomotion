# Batch 2 V1: Wider push range (targeted fix for push OOD vulnerability)
# Inherits from randomized.yaml, only overrides push_vel_range
# Rationale: Training range [0.5, 2.0] covers only eval levels 0-2.
#   Widening to [0.5, 5.0] covers eval push 3-5 level in-distribution.
task:
  name: randomized
  domain_randomization:
    enabled: true
    friction_range: [0.3, 2.0]       # unchanged
    restitution_range: [0.0, 0.8]    # unchanged
    added_mass_range: [-2.0, 5.0]    # unchanged
    com_displacement_range: [-0.08, 0.08]  # unchanged
    motor_strength_range: [0.7, 1.3] # unchanged
    kp_range: [0.8, 1.2]             # unchanged
    kd_range: [0.8, 1.2]             # unchanged
    action_delay_range: [0, 3]        # unchanged
    push_vel_range: [0.5, 5.0]       # WIDENED: was [0.5, 2.0]
    push_steps: [5, 10, 15]          # unchanged
  terrain:
    type: flat
    curriculum: false
