# Task: Terrain variation locomotion
task:
  name: terrain
  domain_randomization:
    enabled: true
    friction_range: [0.4, 1.8]
    restitution_range: [0.0, 0.5]
    added_mass_range: [-1.0, 3.0]
    motor_strength_range: [0.8, 1.2]
    action_delay_range: [0, 2]
    push_interval: 300
    push_vel_range: [0.3, 1.5]
  terrain:
    type: mixed           # mixed = flat + rough + stairs
    curriculum: true
    difficulty_range: [0.0, 1.0]
