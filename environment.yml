name: dynamite
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy=1.24
  - scipy=1.10
  - pyyaml=6.0
  - matplotlib=3.7
  # PyTorch — adjust cuda version to match your system
  # For RTX 4060: CUDA 12.x recommended
  - pytorch::pytorch=2.2
  - pytorch::pytorch-cuda=12.1
  - pip:
    - tensorboard>=2.14
    - pytest>=7.0
    - pytest-cov>=4.0
    - ruff>=0.1.0
    - scikit-learn>=1.3
    - pandas>=2.0
    - seaborn>=0.12
    # Isaac Lab must be installed separately per NVIDIA instructions
    # See: https://isaac-sim.github.io/IsaacLab/
